<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Negocios Cercanos - Calendify Pro</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0f1116;
      color: white;
    }
    #map {
      height: 90vh;
      width: 100%;
    }
    .header {
      background: #1b1e25;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      margin: 0;
      color: #1abc9c;
    }
    .header a {
      color: white;
      text-decoration: none;
      background: #1abc9c;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Mapa de Negocios Cercanos</h1>
    <a href="index.html">← Volver al inicio</a>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([19.4326, -99.1332], 13); // CDMX

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: 'Map data © OpenStreetMap'
    }).addTo(map);

    const negocios = [
      { nombre: "Estética Bella", lat: 19.432, lng: -99.135 },
      { nombre: "Barbería Elite", lat: 19.436, lng: -99.13 },
      { nombre: "Spa Relax", lat: 19.429, lng: -99.14 }
    ];

    negocios.forEach(n => {
      L.marker([n.lat, n.lng])
        .addTo(map)
        .bindPopup(`<b>${n.nombre}</b>`);
    });
  </script>
</body>
</html>
